name: CI

on:
  push:
    branches:
      - main
      - codex/**
  pull_request:

jobs:
  test:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]
        node: [20, 22]
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v6
        with:
          node-version: ${{ matrix.node }}
          cache: npm
      - run: npm ci
      - run: npm run smoke
      - run: npm test
      - run: npm run test:doctor
      - run: npm run format:check
      - run: npm run lint
      - run: npm run print-agent
      - run: npm run print-agent -- planner
      - run: npm pack --dry-run
      - run: git diff --check
