# Replace every placeholder with an absolute local path.
[mcp_servers.opencode_advisor]
command = "node"
# Windows:
args = ["C:\\path\\to\\opencode-advisor-mcp\\src\\server.mjs"]
# macOS/Linux alternative:
# args = ["/absolute/path/to/opencode-advisor-mcp/src/server.mjs"]
startup_timeout_sec = 30 # connection establishment only
tool_timeout_sec = 420   # keep greater than OPENCODE_ADVISOR_TIMEOUT_MS / 1000

[mcp_servers.opencode_advisor.env]
OPENCODE_ADVISOR_ALLOWED_ROOTS = "C:\\path\\to\\allowed-repo"
OPENCODE_ADVISOR_OPENCODE_DATA_HOME = "C:\\Users\\you\\.codex\\opencode-advisor\\opencode-data"
OPENCODE_ADVISOR_TIMEOUT_MS = "300000"
OPENCODE_ADVISOR_GIT_TIMEOUT_MS = "30000"
OPENCODE_ADVISOR_MAX_DIFF_CHARS = "60000"
# Optional: leave unset for PATH-first discovery.
# OPENCODE_ADVISOR_OPENCODE_CMD = "C:\\Program Files\\OpenCode\\opencode.exe"
